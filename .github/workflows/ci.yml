name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: just install

      - name: Test
        run: just test

      - name: Check
        run: just check
